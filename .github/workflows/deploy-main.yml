name: Deploy Main

on:
  workflow_run:
    workflows:
      - CD
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: GHCR image tag to deploy, for example git-<full_sha>
        required: true
      deploy_ref:
        description: Git ref to pull on the server before running the deploy script
        required: false
        default: main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.repository.full_name == github.repository)
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      DEPLOY_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || format('git-{0}', github.event.workflow_run.head_sha) }}
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_ref || 'main' }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      GHCR_USERNAME: ${{ secrets.GHCR_READ_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
    steps:
      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Trust deployment host
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        shell: bash
        run: |
          deploy_path_escaped="$(printf '%q' "$DEPLOY_PATH")"
          deploy_ref_escaped="$(printf '%q' "$DEPLOY_REF")"
          deploy_image_tag_escaped="$(printf '%q' "$DEPLOY_IMAGE_TAG")"
          ghcr_username_escaped="$(printf '%q' "$GHCR_USERNAME")"
          ghcr_token_escaped="$(printf '%q' "$GHCR_TOKEN")"

          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH=$deploy_path_escaped DEPLOY_REF=$deploy_ref_escaped DEPLOY_IMAGE_TAG=$deploy_image_tag_escaped GHCR_USERNAME=$ghcr_username_escaped GHCR_TOKEN=$ghcr_token_escaped bash -s" <<'EOF'
          set -Eeuo pipefail

          cd "$DEPLOY_PATH"
          git fetch --all --prune --tags
          git checkout "$DEPLOY_REF"

          if git rev-parse --verify "origin/$DEPLOY_REF" >/dev/null 2>&1; then
            git pull --ff-only origin "$DEPLOY_REF"
          fi

          export DEPLOY_IMAGE_TAG GHCR_USERNAME GHCR_TOKEN
          bash deploy/blue-green/deploy.sh
          EOF
