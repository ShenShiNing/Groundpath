name: Deploy Main

on:
  workflow_run:
    workflows:
      - CD
    types:
      - completed
  workflow_dispatch:
    inputs:
      image_tag:
        description: GHCR image tag to deploy, for example git-<full_sha>
        required: true
      deploy_ref:
        description: Git ref to pull on the server before running the deploy script
        required: false
        default: main

concurrency:
  group: production-deploy
  cancel-in-progress: false

jobs:
  deploy:
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event.workflow_run.conclusion == 'success' &&
       github.event.workflow_run.head_branch == 'main' &&
       github.event.workflow_run.repository.full_name == github.repository)
    runs-on: ubuntu-latest
    environment: production
    permissions:
      contents: read
    env:
      DEPLOY_IMAGE_TAG: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.image_tag || format('git-{0}', github.event.workflow_run.head_sha) }}
      DEPLOY_REF: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.deploy_ref || 'main' }}
      DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
      DEPLOY_PORT: ${{ secrets.DEPLOY_PORT != '' && secrets.DEPLOY_PORT || '22' }}
      DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
      DEPLOY_PATH: ${{ secrets.DEPLOY_PATH }}
      GHCR_USERNAME: ${{ secrets.GHCR_READ_USERNAME }}
      GHCR_TOKEN: ${{ secrets.GHCR_READ_TOKEN }}
    steps:
      - name: Validate deployment configuration
        shell: bash
        env:
          DEPLOY_SSH_KEY_PRESENT: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY != '' && 'true' || '' }}
        run: |
          missing=()

          for name in DEPLOY_HOST DEPLOY_USER DEPLOY_PATH; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if [ "${DEPLOY_SSH_KEY_PRESENT:-}" != "true" ]; then
            missing+=("DEPLOY_SSH_PRIVATE_KEY")
          fi

          if [ "${#missing[@]}" -gt 0 ]; then
            {
              echo "### Production deployment is not configured"
              echo
              echo "Missing required GitHub Actions secrets:"
              for name in "${missing[@]}"; do
                echo "- \`$name\`"
              done
              echo
              echo "This job runs with \`environment: production\`."
              echo "Configure the secrets in repository settings or in the \`production\` environment."
            } >> "$GITHUB_STEP_SUMMARY"

            printf '::error title=Missing deployment secrets::Missing required secrets: %s. Configure them in repository settings or the production environment.\n' "$(IFS=', '; echo "${missing[*]}")"
            exit 1
          fi

          if { [ -n "${GHCR_USERNAME:-}" ] && [ -z "${GHCR_TOKEN:-}" ]; } || { [ -z "${GHCR_USERNAME:-}" ] && [ -n "${GHCR_TOKEN:-}" ]; }; then
            echo "::error title=Incomplete GHCR credentials::Set both GHCR_READ_USERNAME and GHCR_READ_TOKEN, or leave both unset when the GHCR images are public."
            exit 1
          fi

      - name: Start SSH agent
        uses: webfactory/ssh-agent@v0.9.1
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_PRIVATE_KEY }}

      - name: Trust deployment host
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          ssh-keyscan -p "$DEPLOY_PORT" -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts

      - name: Deploy over SSH
        shell: bash
        run: |
          deploy_path_escaped="$(printf '%q' "$DEPLOY_PATH")"
          deploy_ref_escaped="$(printf '%q' "$DEPLOY_REF")"
          deploy_image_tag_escaped="$(printf '%q' "$DEPLOY_IMAGE_TAG")"
          ghcr_username_escaped="$(printf '%q' "$GHCR_USERNAME")"
          ghcr_token_escaped="$(printf '%q' "$GHCR_TOKEN")"

          ssh -p "$DEPLOY_PORT" "$DEPLOY_USER@$DEPLOY_HOST" \
            "DEPLOY_PATH=$deploy_path_escaped DEPLOY_REF=$deploy_ref_escaped DEPLOY_IMAGE_TAG=$deploy_image_tag_escaped GHCR_USERNAME=$ghcr_username_escaped GHCR_TOKEN=$ghcr_token_escaped bash -s" <<'EOF'
          set -Eeuo pipefail

          cd "$DEPLOY_PATH"
          git fetch --all --prune --tags
          git checkout "$DEPLOY_REF"

          if git rev-parse --verify "origin/$DEPLOY_REF" >/dev/null 2>&1; then
            git pull --ff-only origin "$DEPLOY_REF"
          fi

          export DEPLOY_IMAGE_TAG GHCR_USERNAME GHCR_TOKEN
          bash deploy/blue-green/deploy.sh
          EOF
