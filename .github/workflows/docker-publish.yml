name: CD

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  publish-images:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Derive lowercase image names
        id: names
        run: |
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"
          repo="$(echo "${GITHUB_REPOSITORY#*/}" | tr '[:upper:]' '[:lower:]')"
          echo "server=ghcr.io/${owner}/${repo}-server" >> "$GITHUB_OUTPUT"
          echo "client=ghcr.io/${owner}/${repo}-client" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract server metadata
        id: server-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.names.outputs.server }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=git-${{ github.sha }}
            type=sha
            type=ref,event=branch

      - name: Extract client metadata
        id: client-meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.names.outputs.client }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=git-${{ github.sha }}
            type=sha
            type=ref,event=branch

      - name: Build and push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.server
          push: true
          tags: ${{ steps.server-meta.outputs.tags }}
          labels: ${{ steps.server-meta.outputs.labels }}

      - name: Build and push client image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.client
          push: true
          tags: ${{ steps.client-meta.outputs.tags }}
          labels: ${{ steps.client-meta.outputs.labels }}
