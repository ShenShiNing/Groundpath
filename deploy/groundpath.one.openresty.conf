# Reference OpenResty config for groundpath.one.
# In 1Panel, you can either:
# 1. Create a reverse proxy site with target http://127.0.0.1:18080
# 2. Or paste the matching directives into the site's custom config

server {
  listen 80;
  listen [::]:80;
  server_name www.groundpath.one;

  return 301 https://groundpath.one$request_uri;
}

server {
  listen 80;
  listen [::]:80;
  server_name groundpath.one;

  return 301 https://groundpath.one$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.groundpath.one;

  ssl_certificate /www/sites/groundpath.one/ssl/fullchain.pem;
  ssl_certificate_key /www/sites/groundpath.one/ssl/privkey.pem;

  return 301 https://groundpath.one$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name groundpath.one;

  ssl_certificate /www/sites/groundpath.one/ssl/fullchain.pem;
  ssl_certificate_key /www/sites/groundpath.one/ssl/privkey.pem;

  client_max_body_size 100m;

  location / {
    proxy_pass http://127.0.0.1:18080;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}
