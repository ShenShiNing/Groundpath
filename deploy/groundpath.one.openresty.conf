# Reference OpenResty config for groundpath.one.
# In 1Panel, you can either:
# 1. Create a reverse proxy site with target http://127.0.0.1:18080
# 2. Or paste the matching directives into the site's custom config

server {
  listen 80;
  listen [::]:80;
  server_name www.groundpath.one;

  return 301 https://groundpath.one$request_uri;
}

server {
  listen 80;
  listen [::]:80;
  server_name groundpath.one;

  return 301 https://groundpath.one$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name www.groundpath.one;

  ssl_certificate /www/sites/groundpath.one/ssl/fullchain.pem;
  ssl_certificate_key /www/sites/groundpath.one/ssl/privkey.pem;

  return 301 https://groundpath.one$request_uri;
}

server {
  listen 443 ssl http2;
  listen [::]:443 ssl http2;
  server_name groundpath.one;

  ssl_certificate /www/sites/groundpath.one/ssl/fullchain.pem;
  ssl_certificate_key /www/sites/groundpath.one/ssl/privkey.pem;

  client_max_body_size 100m;

  # Recover the real client IP from any trusted upstream reverse proxy
  # before proxying into the Dockerized client/server chain.
  # Tighten these ranges to your actual proxy CIDRs if you know them.
  set_real_ip_from 127.0.0.1;
  set_real_ip_from ::1;
  set_real_ip_from 10.0.0.0/8;
  set_real_ip_from 172.16.0.0/12;
  set_real_ip_from 192.168.0.0/16;
  set_real_ip_from fc00::/7;
  real_ip_header X-Forwarded-For;
  real_ip_recursive on;

  # Default blue target. Create the include file before the first reload:
  #   cp deploy/blue-green/groundpath-active.inc.example /www/sites/groundpath.one/proxy/groundpath-active.inc
  # The deployment script rewrites that include and gracefully reloads OpenResty.
  set $groundpath_client_upstream http://127.0.0.1:18081;
  include /www/sites/groundpath.one/proxy/groundpath-active.inc;

  location / {
    proxy_pass $groundpath_client_upstream;
    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_buffering off;
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;
  }
}
